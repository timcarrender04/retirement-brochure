# Coolify attaches its reverse proxy to the container port — avoid fixed host "ports:"
# mappings here (they fight Traefik and can cause redirect/connection issues).
services:
  brochure:
    build: .
    expose:
      - "80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
