# Coolify: Traefik handles HTTPS. Container serves plain HTTP on 80 only.
# In Coolify, set the service port to 80 (not 443).
services:
  brochure:
    build: .
    expose:
      - "80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
