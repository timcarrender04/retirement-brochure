# HTTP only on port 80. Coolify (Traefik) terminates TLS — do not terminate HTTPS
# inside this container; routing :443 here often causes redirect loops with the proxy.

gzip on;
gzip_types text/plain text/css application/javascript application/json image/svg+xml;

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    absolute_redirect off;
    port_in_redirect off;

    location /images/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
