server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Static SPA only — no TLS or host redirects here (those belong on the edge proxy).
    # Relative redirects avoid some proxy + absolute-Location redirect loops.
    absolute_redirect off;
    port_in_redirect off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location /images/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
