# HTTP (80) + HTTPS (443). No HTTP→HTTPS redirects here (Coolify/Traefik/Cloudflare handle TLS).
# default_server + server_name _ = accept any Host; avoids mis-matched-host edge cases.
# Mount real certs at /etc/nginx/ssl/{fullchain.pem,privkey.pem} for strict TLS to origin.

gzip on;
gzip_types text/plain text/css application/javascript application/json image/svg+xml;

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    absolute_redirect off;
    port_in_redirect off;

    location /images/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    absolute_redirect off;
    port_in_redirect off;

    location /images/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
